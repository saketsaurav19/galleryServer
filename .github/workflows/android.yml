name: Build Android

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

    - name: Accept Android SDK licenses
      run: |
        yes | sdkmanager --licenses || true
        mkdir -p $ANDROID_HOME/licenses
        echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd562634340d9f23b0d117c4f87182ff9a3510c49\n24333f8a63b6825ea9c55731873c017244b25151\n84831b9409646a918e30573bab4c9c91346d8abd\n494191333e6b46442770ee35065770c8404d3936\n393613511115174411135111151111111111111\n" > $ANDROID_HOME/licenses/android-sdk-license

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: gradle-

    - name: Build Release APKs
      working-directory: Android/src
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon

    - name: List built APKs
      run: |
        echo "=== All APKs ==="
        find Android/src/app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

    - name: Upload all APKs
      uses: actions/upload-artifact@v4
      with:
        name: apks
        path: Android/src/app/build/outputs/apk/release/*.apk

    # Create GitHub Release when a v* tag is pushed
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: Android/src/app/build/outputs/apk/release/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
